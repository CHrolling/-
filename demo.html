<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到STUDYOS</title>
</head>
<style>
    .login-card{
        min-height: 100vh;
        display:flex;
        justify-content:center;
        align-items: center;
    }
  .h1{
    display:flex;
    justify-content:center;
    align-items:center;
    background-color: rgba(46, 82, 144, 0.5);
    text-align: center;
    font-size: 60px;
  }
  .p{
    width: 300px;        
    height: 40px;        
    padding: 10px;
    font-size :30px;
    font-family:楷体;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  .label{display:flex;
    justify-content:center;
    align-items:center;}
</style>
<body>
    <div class="login-card">
        <div class="h1">
            <b>学而不思则罔，思而不学则殆</b>
        </div>
        <br>
        <div class="p">
            <i>欢迎来到STUDYOS！</i>
        </div>
    <br>
    <div class="input-row">
    <label for="username">用户名：</label>
    <input type="text" placeholder="请输入用户名" id="username"><br>
    <label for="password">密码：</label><input type="password" placeholder="请输入密码" id="password"><br>
    <button type="submit">
        登录
    </button>
    </div>
</body>
</html>
